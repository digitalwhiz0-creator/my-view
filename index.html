<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Photo</title>

    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "vovn59tmej");
    </script>

    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            text-align: center;
            cursor: zoom-in;
        }
        img { 
            max-width: 100%; 
            height: auto; 
            transition: transform 0.3s ease;
            user-select: none;
            -webkit-user-select: none;
        }
        /* This class is triggered when they tap the photo */
        .zoomed {
            transform: scale(2.5); /* Makes it 2.5x bigger */
            cursor: zoom-out;
        }
    </style>
</head>
<body>

    <div class="container" onclick="toggleZoom(this)">
        <img src="IMG_20260201_063749.jpg" id="target-photo" alt="Shared Image">
    </div>

    <script>
        function toggleZoom(element) {
            const img = document.getElementById('target-photo');
            img.classList.toggle('zoomed');
            
            // Log a custom event so you see "Zoom Triggered" in Clarity timeline
            if(window.clarity) {
                window.clarity("event", "user_zoomed");
            }
        }
    </script>

</body>
</html>
